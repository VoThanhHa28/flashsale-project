<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Socket.io Test Client</title>
        <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 900px;
                margin: 0 auto;
            }

            .header {
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                margin-bottom: 20px;
                text-align: center;
            }

            h1 {
                color: #667eea;
                margin-bottom: 10px;
            }

            .status {
                display: inline-block;
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 14px;
                font-weight: 600;
                margin-top: 10px;
            }

            .status.connected {
                background: #10b981;
                color: white;
            }

            .status.disconnected {
                background: #ef4444;
                color: white;
            }

            .cards {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-bottom: 20px;
            }

            .card {
                background: white;
                padding: 25px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            .card h2 {
                color: #667eea;
                margin-bottom: 15px;
                font-size: 18px;
            }

            .log-container {
                background: white;
                padding: 25px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            .log {
                background: #1e293b;
                color: #e2e8f0;
                padding: 15px;
                border-radius: 8px;
                max-height: 400px;
                overflow-y: auto;
                font-family: "Courier New", monospace;
                font-size: 13px;
                line-height: 1.6;
            }

            .log-item {
                margin-bottom: 8px;
                padding: 8px;
                border-left: 3px solid #667eea;
                background: rgba(102, 126, 234, 0.1);
            }

            .log-item.stock {
                border-left-color: #10b981;
                background: rgba(16, 185, 129, 0.1);
            }

            .log-item.flash-sale {
                border-left-color: #f59e0b;
                background: rgba(245, 158, 11, 0.1);
            }

            .log-item.error {
                border-left-color: #ef4444;
                background: rgba(239, 68, 68, 0.1);
            }

            .timestamp {
                color: #94a3b8;
                font-size: 11px;
            }

            button {
                background: #667eea;
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 600;
                width: 100%;
                margin-top: 10px;
                transition: background 0.3s;
            }

            button:hover {
                background: #5568d3;
            }

            button:disabled {
                background: #cbd5e1;
                cursor: not-allowed;
            }

            .stats {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                margin-top: 15px;
            }

            .stat {
                background: #f1f5f9;
                padding: 15px;
                border-radius: 8px;
                text-align: center;
            }

            .stat-value {
                font-size: 24px;
                font-weight: 700;
                color: #667eea;
            }

            .stat-label {
                font-size: 12px;
                color: #64748b;
                margin-top: 5px;
            }

            pre {
                background: #0f172a;
                color: #94a3b8;
                padding: 12px;
                border-radius: 6px;
                overflow-x: auto;
                font-size: 12px;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🔌 Socket.io Test Client</h1>
                <p>Backend: <strong id="socketUrl">http://localhost:3000</strong></p>
                <div id="status" class="status disconnected">⚫ Disconnected</div>
                <div id="socketId" style="margin-top: 10px; color: #64748b; font-size: 14px"></div>
            </div>

            <div class="cards">
                <div class="card">
                    <h2>📦 Stock Updates</h2>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="stockCount">0</div>
                            <div class="stat-label">Updates</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="lastStock">-</div>
                            <div class="stat-label">Last Stock</div>
                        </div>
                    </div>
                    <pre id="lastStockData">Waiting for stock updates...</pre>
                </div>

                <div class="card">
                    <h2>🔥 Flash Sales</h2>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="flashCount">0</div>
                            <div class="stat-label">Events</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="lastFlash">-</div>
                            <div class="stat-label">Last Event</div>
                        </div>
                    </div>
                    <pre id="lastFlashData">Waiting for flash sale events...</pre>
                </div>
            </div>

            <div class="log-container">
                <h2 style="color: #667eea; margin-bottom: 15px">📝 Event Log</h2>
                <button onclick="clearLog()">Clear Log</button>
                <div class="log" id="log"></div>
            </div>
        </div>

        <script>
            const SOCKET_URL = "http://localhost:3000";
            let socket;
            let stockCount = 0;
            let flashCount = 0;

            // Update socket URL display
            document.getElementById("socketUrl").textContent = SOCKET_URL;

            // Initialize socket connection
            function initSocket() {
                socket = io(SOCKET_URL, {
                    transports: ["websocket", "polling"],
                    reconnection: true,
                    reconnectionDelay: 1000,
                    reconnectionAttempts: 5,
                });

                // Connection events
                socket.on("connect", () => {
                    log("✅ Connected to server", "success");
                    updateStatus(true);
                    document.getElementById("socketId").textContent = `Socket ID: ${socket.id}`;
                });

                socket.on("disconnect", (reason) => {
                    log(`❌ Disconnected: ${reason}`, "error");
                    updateStatus(false);
                    document.getElementById("socketId").textContent = "";
                });

                socket.on("connect_error", (error) => {
                    log(`❌ Connection error: ${error.message}`, "error");
                    updateStatus(false);
                });

                // Stock update events
                socket.on("update-stock", (data) => {
                    stockCount++;
                    log(`📦 Stock Update: Product ${data.productId.slice(-4)} - Remaining: ${data.remainingStock}`, "stock");

                    document.getElementById("stockCount").textContent = stockCount;
                    document.getElementById("lastStock").textContent = data.remainingStock;
                    document.getElementById("lastStockData").textContent = JSON.stringify(data, null, 2);
                });

                // Flash sale events
                socket.on("flash-sale-start", (data) => {
                    flashCount++;
                    log(`🔥 Flash Sale: ${data.productName} - ${data.message}`, "flash-sale");

                    document.getElementById("flashCount").textContent = flashCount;
                    document.getElementById("lastFlash").textContent = new Date(data.startTime).toLocaleTimeString();
                    document.getElementById("lastFlashData").textContent = JSON.stringify(data, null, 2);
                });

                // Listen to all events
                socket.onAny((eventName, ...args) => {
                    if (!["connect", "disconnect", "update-stock", "flash-sale-start"].includes(eventName)) {
                        log(`📡 Event: ${eventName}`, "info");
                        console.log(eventName, args);
                    }
                });
            }

            // Update connection status
            function updateStatus(connected) {
                const statusEl = document.getElementById("status");
                if (connected) {
                    statusEl.textContent = "🟢 Connected";
                    statusEl.className = "status connected";
                } else {
                    statusEl.textContent = "🔴 Disconnected";
                    statusEl.className = "status disconnected";
                }
            }

            // Log function
            function log(message, type = "info") {
                const logEl = document.getElementById("log");
                const timestamp = new Date().toLocaleTimeString();
                const logItem = document.createElement("div");
                logItem.className = `log-item ${type}`;
                logItem.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
                logEl.insertBefore(logItem, logEl.firstChild);

                // Keep only last 50 logs
                while (logEl.children.length > 50) {
                    logEl.removeChild(logEl.lastChild);
                }
            }

            // Clear log
            function clearLog() {
                document.getElementById("log").innerHTML = "";
                log("🗑️ Log cleared", "info");
            }

            // Initialize on page load
            window.addEventListener("DOMContentLoaded", () => {
                initSocket();
                log("🚀 Socket.io test client initialized", "info");
            });
        </script>
    </body>
</html>
