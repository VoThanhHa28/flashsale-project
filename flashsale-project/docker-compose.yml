services:
  # 1. APP BACKEND (Của team bạn)
  backend:
    build: .
    container_name: flashsale_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/flashsale_db
      - REDIS_URI=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - mongo
      - redis
      - rabbitmq
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - flashsale-network

  # 1.5. MongoDB
  mongo:
    image: mongo:7.0
    container_name: flashsale_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: flashsale_db
    volumes:
      - mongo_data:/data/db
    networks:
      - flashsale-network

  # 2. Redis
  redis: # Tên service là redis
    image: redis:alpine
    container_name: flashsale_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - flashsale-network

  # 3. RabbitMQ
  rabbitmq: # Tên service là rabbitmq
    image: rabbitmq:3-management
    container_name: flashsale_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - flashsale-network

volumes:
  mongo_data:
  rabbitmq_data:

networks:
  flashsale-network:
    driver: bridge